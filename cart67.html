<!DOCTYPE html>
<html>
<head>
    <title>My Shop Account</title>
    <link rel="stylesheet" href="music.css">
</head>
<body>

<header>
    <h1>CART 67</h1>
    <p>Select your items below</p>
</header>

<div class="container">
    <table>
        <tr>
            <th>Select</th>
            <th>Item</th>
            <th>Price ($)</th>
            <th>Quantity</th>
        </tr>
        <tr>
            <td><input type="checkbox" class="item" data-price="1"></td>
            <td>Apple</td>
            <td>1</td>
            <td><input type="number" class="qty" value="1" min="1"></td>
        </tr>
        <tr>
            <td><input type="checkbox" class="item" data-price="1.5"></td>
            <td>Banana</td>
            <td>1.5</td>
            <td><input type="number" class="qty" value="1" min="1"></td>
        </tr>
        <tr>
            <td><input type="checkbox" class="item" data-price="1.2"></td>
            <td>Orange</td>
            <td>1.2</td>
            <td><input type="number" class="qty" value="1" min="1"></td>
        </tr>
        <tr>
            <td><input type="checkbox" class="item" data-price="1.8"></td>
            <td>Milk</td>
            <td>1.8</td>
            <td><input type="number" class="qty" value="1" min="1"></td>
        </tr>
         <tr>
            <td><input type="checkbox" class="item" data-price="0.9"></td>
            <td>Grapes</td>
            <td>0.9</td>
            <td><input type="number" class="qty" value="1" min="1"></td>
        </tr>
         <tr>
            <td><input type="checkbox" class="item" data-price="3.2"></td>
            <td>Juice</td>
            <td>3.2</td>
            <td><input type="number" class="qty" value="1" min="1"></td>
        </tr>
         <tr>
            <td><input type="checkbox" class="item" data-price="2"></td>
            <td>Biscuit</td>
            <td>2</td>
            <td><input type="number" class="qty" value="1" min="1"></td>
        </tr>
         <tr>
            <td><input type="checkbox" class="item" data-price="3"></td>
            <td>Noodles</td>
            <td>3</td>
            <td><input type="number" class="qty" value="1" min="1"></td>
        </tr>
         <tr>
            <td><input type="checkbox" class="item" data-price="2.5"></td>
            <td>Chips</td>
            <td>2.5</td>
            <td><input type="number" class="qty" value="1" min="1"></td>
        </tr>
    </table>

    <div class="total">
        Total: $<span id="total">0.00</span>
    </div>
</div>

<script>

    var items = document.querySelectorAll('.item');
    var qtys = document.querySelectorAll('.qty');
    var totalDisplay = document.getElementById('total');

    function calculateTotal() {
        var total = 0;
        for (var i = 0; i < items.length; i++) {
            if (items[i].checked) {
                var price = parseFloat(items[i].dataset.price);
                var quantity = parseInt(qtys[i].value);
                total += price * quantity;
            }
        }
        totalDisplay.textContent = total.toFixed(2);
    }

    for (var i = 0; i < items.length; i++) {
        items[i].addEventListener('change', calculateTotal);
        qtys[i].addEventListener('input', calculateTotal);
    }
</script>

</body>
</html>
