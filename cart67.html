<!DOCTYPE html>
<html>
<head>
    <title>Shop Account</title>
   
    <link rel="stylesheet" href="music.css">
</head>
<body>


    <header>
        <h1>My Shop Account</h1>
        <p>Select your items below</p>
    </header>

    <div class="container">
        <form action="#" method="post">
            <table>
                <tr>
                    <th>Select</th>
                    <th>Item</th>
                    <th>Price ($)</th>
                    <th>Quantity</th>
                </tr>
                <tr>
                    <td><input type="checkbox" name="item1"></td>
                    <td>Apple</td>
                    <td>1</td>
                    <td><input type="number" name="qty1" value="1" min="1"></td>
                </tr>
                <tr>
                    <td><input type="checkbox" name="item2"></td>
                    <td>Banana</td>
                    <td>0.5</td>
                    <td><input type="number" name="qty2" value="1" min="1"></td>
                </tr>
                <tr>
                    <td><input type="checkbox" name="item3"></td>
                    <td>Orange</td>
                    <td>0.8</td>
                    <td><input type="number" name="qty3" value="1" min="1"></td>
                </tr>
                <tr>
                    <td><input type="checkbox" name="item4"></td>
                    <td>Milk</td>
                    <td>1.2</td>
                    <td><input type="number" name="qty4" value="1" min="1"></td>
                </tr>
            </table>

            
            <div class="total">
                Total: $0.00
            </div>
            <script>
   
    var items = document.querySelectorAll('.item');
    var qtys = document.querySelectorAll('.qty');
    var totalDisplay = document.getElementById('total');

    function calculateTotal() {
        var total = 0;
        for (var i = 0; i < items.length; i++) {
            if (items[i].checked) {
                var price = parseFloat(items[i].dataset.price);
                var quantity = parseInt(qtys[i].value);
                total += price * quantity;
            }
        }
        totalDisplay.textContent = total.toFixed(2);
    }

   
    for (var i = 0; i < items.length; i++) {
        items[i].addEventListener('change', calculateTotal);
        qtys[i].addEventListener('input', calculateTotal);
    }
</script>

            <br>
            <input type="submit" value="Place Order">
        </form>
    </div>

</body>
</html>
